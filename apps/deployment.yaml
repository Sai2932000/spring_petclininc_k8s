apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet-clinic
  namespace: dev_ns
  labels:
    app: spring_pet_clinic
spec:
  replicas: 4
  minReadySeconds: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: spring_pet_clinic
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: spring_pet_clinic
    spec:
      containers:
      - name: pet-clinic
        image: sai8032/sai_petclinic:1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "500Mi"
            cpu: "150m"
          limits:
            memory: "1Gi"
            cpu: "500m"
